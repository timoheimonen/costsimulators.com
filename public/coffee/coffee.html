<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee - Costsimulators.com</title>
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <div class="container simulator-container" id="simulatorContainer">
        <div class="form-group">
            <label>COFFEE PRICE $</label>
            <div class="input-with-buttons">
                <button class="adjust-btn minus" data-target="coffeePrice" data-step="0.5">-</button>
                <input type="number" id="coffeePrice" placeholder="0.00" min="0.01" step="0.01">
                <button class="adjust-btn plus" data-target="coffeePrice" data-step="0.5">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>PER WEEK</label>
            <div class="input-with-buttons">
                <button class="adjust-btn minus" data-target="perWeek" data-step="1">-</button>
                <input type="number" id="perWeek" placeholder="0" min="1" step="1">
                <button class="adjust-btn plus" data-target="perWeek" data-step="1">+</button>
            </div>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="result-row">
                <span class="result-label">1 YEAR</span>
                <span class="result-value" id="year1">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">5 YEARS</span>
                <span class="result-value" id="year5">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">10 YEARS</span>
                <span class="result-value" id="year10">$0.00</span>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        Copyright (c) 2026 Timo Heimonen (timo.heimonen@proton.me) | <a
            href="https://github.com/timoheimonen/costsimulators.com" target="_blank"
            rel="noopener noreferrer">GitHub</a>
    </footer>
    <a href="../index.html" class="back-link">BACK</a>

    <script src="../js/costsimulators.js"></script>
    <script src="../js/calculator.js"></script>
    <script src="../js/ui.js"></script>

    <script>
        (function () {
            'use strict';

            const { UI, Calculators, formatCurrency } = window.CostSimulators;

            function calculateAndDisplay() {
                const inputs = UI.getInputValues(['coffeePrice', 'perWeek']);
                const resultsContainer = document.getElementById('resultsContainer');

                if (inputs.coffeePrice >= 0.01 && inputs.perWeek >= 1) {
                    const year1 = Calculators.weeklyCost({
                        price: inputs.coffeePrice,
                        perWeek: inputs.perWeek,
                        years: 1
                    });

                    const year5 = Calculators.weeklyCost({
                        price: inputs.coffeePrice,
                        perWeek: inputs.perWeek,
                        years: 5
                    });

                    const year10 = Calculators.weeklyCost({
                        price: inputs.coffeePrice,
                        perWeek: inputs.perWeek,
                        years: 10
                    });

                    document.getElementById('year1').textContent = formatCurrency(year1);
                    document.getElementById('year5').textContent = formatCurrency(year5);
                    document.getElementById('year10').textContent = formatCurrency(year10);

                    resultsContainer.classList.add('visible');
                } else {
                    resultsContainer.classList.remove('visible');
                }
            }

            UI.initURLSync(
                ['coffeePrice', 'perWeek'],
                { coffeePrice: 'price', perWeek: 'pw' },
                calculateAndDisplay
            );

            UI.initAdjustButtons({
                inputId: 'coffeePrice',
                minusSelector: '[data-target="coffeePrice"].minus',
                plusSelector: '[data-target="coffeePrice"].plus',
                onChange: calculateAndDisplay,
                disabledWhenRunning: false
            });

            UI.initAdjustButtons({
                inputId: 'perWeek',
                minusSelector: '[data-target="perWeek"].minus',
                plusSelector: '[data-target="perWeek"].plus',
                onChange: calculateAndDisplay,
                disabledWhenRunning: false
            });

            document.getElementById('coffeePrice').addEventListener('input', calculateAndDisplay);
            document.getElementById('perWeek').addEventListener('input', calculateAndDisplay);
        })();
    </script>
</body>

</html>
