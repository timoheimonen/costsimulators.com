<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetings - Costsimulators.com</title>
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <div class="container simulator-container" id="simulatorContainer">
        <div class="form-group">
            <label>$ PER HOUR</label>
            <div class="input-with-buttons">
                <button class="adjust-btn minus" data-target="costPerHour" data-step="5">-</button>
                <input type="number" id="costPerHour" placeholder="0" value="75" min="0" step="0.01">
                <button class="adjust-btn plus" data-target="costPerHour" data-step="5">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>HOW MANY PERSONS?</label>
            <div class="input-with-buttons">
                <button class="adjust-btn minus" data-target="persons" data-step="1">-</button>
                <input type="number" id="persons" placeholder="0" value="5" min="1">
                <button class="adjust-btn plus" data-target="persons" data-step="1">+</button>
            </div>
        </div>

        <div class="button-group">
            <button class="btn start-button" id="startBtn">START</button>
            <button class="btn secondary-button" id="copyBtn" style="display: none;">COPY REPORT</button>
        </div>

        <div class="display cost-display" id="cost">$0.00</div>
        <div class="display timer-display" id="timer">00:00:00</div>
    </div>

    <footer class="site-footer">
        Copyright (c) 2026 Timo Heimonen (timo.heimonen@proton.me) | <a
            href="https://github.com/timoheimonen/costsimulators.com" target="_blank"
            rel="noopener noreferrer">GitHub</a>
    </footer>
    <a href="../index.html" class="back-link">BACK</a>

    <script src="../js/costsimulators.js"></script>
    <script src="../js/timer.js"></script>
    <script src="../js/calculator.js"></script>
    <script src="../js/ui.js"></script>

    <script>
        (function () {
            'use strict';

            const state = {
                isRunning: false,
                totalBurned: 0
            };

            const { Timer, Calculators, UI, formatTime, formatCurrency } = window.CostSimulators;

            const timer = new Timer();

            timer.onTick(function (elapsedMs) {
                const inputs = UI.getInputValues(['costPerHour', 'persons']);
                state.totalBurned = Calculators.hourlyCost({
                    rate: inputs.costPerHour,
                    quantity: inputs.persons,
                    elapsedMs: elapsedMs
                });

                UI.updateDisplays({
                    timerId: 'timer',
                    costId: 'cost',
                    containerSelector: '#simulatorContainer'
                }, formatTime(elapsedMs), formatCurrency(state.totalBurned));
            });

            UI.initURLSync(
                ['costPerHour', 'persons'],
                { costPerHour: 'rate', persons: 'p' }
            );

            UI.initAdjustButtons({
                inputId: 'costPerHour',
                minusSelector: '[data-target="costPerHour"].minus',
                plusSelector: '[data-target="costPerHour"].plus',
                onChange: function () { },
                disabledWhenRunning: true
            }, state);

            UI.initAdjustButtons({
                inputId: 'persons',
                minusSelector: '[data-target="persons"].minus',
                plusSelector: '[data-target="persons"].plus',
                onChange: function () { },
                disabledWhenRunning: true
            }, state);

            const buttonController = UI.initStateButton(
                { buttonId: 'startBtn' },
                {
                    onStart: function () {
                        const inputs = UI.getInputValues(['costPerHour', 'persons']);
                        if (inputs.costPerHour <= 0 || inputs.persons <= 0) return false;

                        state.isRunning = true;
                        UI.setAdjustButtonsEnabled(false);
                        UI.setTimerRunning('#simulatorContainer', true);
                        UI.toggleElement('copyBtn', false);
                        timer.start();
                        return true;
                    },
                    onStop: function () {
                        state.isRunning = false;
                        timer.stop();
                        UI.toggleElement('copyBtn', true);
                    },
                    onReset: function () {
                        timer.reset();
                        state.totalBurned = 0;
                        UI.setAdjustButtonsEnabled(true);
                        UI.setTimerRunning('#simulatorContainer', false);
                        UI.updateDisplays({
                            timerId: 'timer',
                            costId: 'cost',
                            containerSelector: '#simulatorContainer'
                        }, '00:00:00', '$0.00');
                        UI.toggleElement('copyBtn', false);
                        document.getElementById('copyBtn').textContent = 'COPY REPORT';
                    }
                }
            );

            document.getElementById('copyBtn').addEventListener('click', function () {
                const duration = document.getElementById('timer').textContent;
                const inputs = UI.getInputValues(['costPerHour', 'persons']);
                const report = 'Meeting Cost: ' + formatCurrency(state.totalBurned) +
                    ' (' + inputs.persons + ' persons, ' + duration + ')\n' +
                    'Simulated via costsimulators.com';

                UI.copyToClipboard(report, 'copyBtn', 'COPIED!', 'COPY AGAIN?');
            });
        })();
    </script>
</body>

</html>
